<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreIQ — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <h1>🏪 StoreIQ</h1>
                <p>Analytics for your store</p>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <h2>Welcome back</h2>
            <p class="subtitle">Enter your WhatsApp number to get a login code</p>

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input
                        type="tel"
                        name="phone"
                        placeholder="91XXXXXXXXXX"
                        required
                        autofocus
                    />
                </div>
                <button type="submit" class="btn">
                    Send OTP on WhatsApp 📲
                </button>
            </form>
        </div>
    </div>
</body>
</html>
